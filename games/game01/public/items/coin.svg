  <!-- ₩ symbol -->
  <text x="64" y="88" font-family="Arial Black, Arial, sans-serif" font-size="64" font-weight="900" text-anchor="middle" fill="#6b4504" stroke="#3d2700" stroke-width="1.5">₩</text>
