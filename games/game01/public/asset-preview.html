<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>직장인 잔혹사 — 에셋 프리뷰</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 20px;
  }
  h1 { text-align: center; margin-bottom: 8px; font-size: 1.4rem; }
  .subtitle { text-align: center; color: #888; margin-bottom: 20px; font-size: 0.9rem; }

  .controls {
    display: flex; flex-wrap: wrap; gap: 16px;
    justify-content: center; align-items: center;
    background: #16213e; border-radius: 12px; padding: 16px;
    margin-bottom: 24px; max-width: 900px; margin-left: auto; margin-right: auto;
  }
  .control-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .control-group label { font-size: 0.8rem; color: #aaa; }
  .control-group .value { font-size: 0.85rem; font-weight: bold; color: #e94560; min-width: 50px; text-align: center; }
  input[type="range"] { width: 160px; accent-color: #e94560; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .tile-card {
    background: #16213e;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }
  .tile-card h3 { font-size: 0.9rem; margin-bottom: 10px; color: #e94560; }
  .tile-preview {
    position: relative;
    width: 200px; height: 200px;
    margin: 0 auto;
    background: #000;
    border-radius: 8px;
    overflow: hidden;
  }
  .tile-preview img {
    position: absolute;
    image-rendering: pixelated;
  }
  .tile-preview .road-tile {
    left: 0; top: 0;
    width: 100%; height: 100%;
  }
  .tile-preview .character {
    z-index: 10;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  }

  .guide-line {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: rgba(255, 255, 0, 0.4);
    z-index: 5;
    pointer-events: none;
  }

  .section-title {
    text-align: center;
    font-size: 1.1rem;
    margin: 30px 0 16px;
    color: #e94560;
    max-width: 1200px;
    margin-left: auto; margin-right: auto;
    border-bottom: 1px solid #333;
    padding-bottom: 8px;
  }

  .char-select {
    display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
  }
  .char-select button {
    background: #0f3460; border: 2px solid #333; color: #eee;
    padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 0.8rem;
  }
  .char-select button.active { border-color: #e94560; background: #1a1a4e; }

  /* ── Upload zone ── */
  .upload-section {
    max-width: 900px; margin: 0 auto 24px;
    background: #16213e; border-radius: 12px; padding: 20px;
  }
  .upload-section h2 { font-size: 1rem; margin-bottom: 12px; color: #e94560; text-align: center; }
  .upload-row {
    display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;
  }
  .upload-slot {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    width: 120px;
  }
  .upload-slot label { font-size: 0.75rem; color: #aaa; }
  .drop-zone {
    width: 100px; height: 100px;
    border: 2px dashed #444;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    background: #0d1b36;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .drop-zone:hover, .drop-zone.dragover { border-color: #e94560; }
  .drop-zone img {
    width: 100%; height: 100%;
    object-fit: contain;
    image-rendering: pixelated;
  }
  .drop-zone .placeholder {
    font-size: 0.7rem; color: #555; text-align: center; padding: 4px;
    pointer-events: none;
  }
  .drop-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }
  .reset-btn {
    background: #333; border: 1px solid #555; color: #aaa;
    padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem;
    margin-top: 2px;
  }
  .reset-btn:hover { background: #444; color: #eee; }
</style>
</head>
<body>

<h1>직장인 잔혹사 — 캐릭터 배치 프리뷰</h1>
<p class="subtitle">디자이너용: 도로 타일 위 캐릭터 위치 확인</p>

<!-- ── Custom Asset Upload ── -->
<div class="upload-section">
  <h2>커스텀 에셋 업로드 (드래그 앤 드롭 또는 클릭)</h2>
  <div class="upload-row" id="uploadRow"></div>
</div>

<div class="controls">
  <div class="control-group">
    <label>캐릭터 Y 오프셋</label>
    <input type="range" id="offsetY" min="-100" max="50" value="0" step="1">
    <span class="value" id="offsetY-val">0px</span>
  </div>
  <div class="control-group">
    <label>캐릭터 크기 (레인 대비 %)</label>
    <input type="range" id="charScale" min="50" max="150" value="120" step="5">
    <span class="value" id="charScale-val">120%</span>
  </div>
  <div class="control-group">
    <label>가이드라인 표시</label>
    <input type="checkbox" id="showGuides" checked>
  </div>
  <div class="control-group">
    <label>캐릭터 방향</label>
    <div class="char-select" id="charDirection">
      <button data-key="rabbit-front" class="active">정면</button>
      <button data-key="rabbit-back">뒷면</button>
      <button data-key="rabbit-side">옆면</button>
    </div>
  </div>
</div>

<div class="section-title">도로 타일별 캐릭터 배치</div>
<div class="grid" id="grid"></div>

<div class="section-title">3칸 연속 도로 (스크롤 느낌)</div>
<div style="display:flex; justify-content:center; gap: 20px; flex-wrap: wrap; max-width:1200px; margin:0 auto;">
  <div class="tile-card">
    <h3>직선 도로 3칸 + 캐릭터</h3>
    <div class="tile-preview" id="multi-straight" style="height:400px;"></div>
  </div>
  <div class="tile-card">
    <h3>코너 전환 (좌→우)</h3>
    <div class="tile-preview" id="multi-corner" style="height:400px;"></div>
  </div>
</div>

<script>
// ── Asset registry: key → image URL (default or user-uploaded) ──
const DEFAULTS = {
  'straight':    'map/straight.png',
  'corner-tl':   'map/corner-tl.png',
  'corner-tr':   'map/corner-tr.png',
  'corner-bl':   'map/corner-bl.png',
  'corner-br':   'map/corner-br.png',
  'bg-tile':     'map/bg-tile.png',
  'rabbit-front':'character/rabbit-front.png',
  'rabbit-back': 'character/rabbit-back.png',
  'rabbit-side': 'character/rabbit-side.png',
};

const assets = { ...DEFAULTS };

const UPLOAD_SLOTS = [
  { key: 'straight',     label: '직선 도로' },
  { key: 'corner-tl',    label: '코너 좌상' },
  { key: 'corner-tr',    label: '코너 우상' },
  { key: 'corner-bl',    label: '코너 좌하' },
  { key: 'corner-br',    label: '코너 우하' },
  { key: 'bg-tile',      label: '배경 타일' },
  { key: 'rabbit-front', label: '캐릭터 정면' },
  { key: 'rabbit-back',  label: '캐릭터 뒷면' },
  { key: 'rabbit-side',  label: '캐릭터 옆면' },
];

const TILE_CARDS = [
  { name: '직선 도로 (straight)', key: 'straight' },
  { name: '코너 좌상 (corner-tl)', key: 'corner-tl' },
  { name: '코너 우상 (corner-tr)', key: 'corner-tr' },
  { name: '코너 좌하 (corner-bl)', key: 'corner-bl' },
  { name: '코너 우하 (corner-br)', key: 'corner-br' },
  { name: '배경 타일 (bg-tile)', key: 'bg-tile' },
];

let charKey = 'rabbit-front';

// ── Upload zone ──
const uploadRow = document.getElementById('uploadRow');

UPLOAD_SLOTS.forEach(slot => {
  const wrapper = document.createElement('div');
  wrapper.className = 'upload-slot';

  const lbl = document.createElement('label');
  lbl.textContent = slot.label;

  const zone = document.createElement('div');
  zone.className = 'drop-zone';
  zone.dataset.key = slot.key;

  const thumb = document.createElement('img');
  thumb.src = assets[slot.key];
  thumb.style.display = 'block';

  const placeholder = document.createElement('div');
  placeholder.className = 'placeholder';
  placeholder.textContent = '클릭 또는\n드래그';
  placeholder.style.display = 'none';

  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = 'image/*';

  zone.appendChild(thumb);
  zone.appendChild(placeholder);
  zone.appendChild(fileInput);

  const resetBtn = document.createElement('button');
  resetBtn.className = 'reset-btn';
  resetBtn.textContent = '초기화';
  resetBtn.addEventListener('click', () => {
    assets[slot.key] = DEFAULTS[slot.key];
    thumb.src = DEFAULTS[slot.key];
    thumb.style.display = 'block';
    placeholder.style.display = 'none';
    rebuildAll();
  });

  // File input change
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    loadFile(file, slot.key, thumb, placeholder);
  });

  // Drag & drop
  zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', (e) => {
    e.preventDefault();
    zone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (!file || !file.type.startsWith('image/')) return;
    loadFile(file, slot.key, thumb, placeholder);
  });

  wrapper.appendChild(lbl);
  wrapper.appendChild(zone);
  wrapper.appendChild(resetBtn);
  uploadRow.appendChild(wrapper);
});

function loadFile(file, key, thumb, placeholder) {
  const reader = new FileReader();
  reader.onload = (ev) => {
    assets[key] = ev.target.result;
    thumb.src = ev.target.result;
    thumb.style.display = 'block';
    placeholder.style.display = 'none';
    rebuildAll();
  };
  reader.readAsDataURL(file);
}

// ── Build tile grid ──
const grid = document.getElementById('grid');
const offsetYInput = document.getElementById('offsetY');
const charScaleInput = document.getElementById('charScale');
const showGuidesInput = document.getElementById('showGuides');

function buildGrid() {
  grid.innerHTML = '';
  TILE_CARDS.forEach(tile => {
    const card = document.createElement('div');
    card.className = 'tile-card';
    card.innerHTML = `
      <h3>${tile.name}</h3>
      <div class="tile-preview" data-key="${tile.key}">
        <img class="road-tile" src="${assets[tile.key]}">
        <div class="guide-line" style="top:50%"></div>
        <img class="character" src="${assets[charKey]}">
      </div>
    `;
    grid.appendChild(card);
  });
}

function buildMultiStraight() {
  const el = document.getElementById('multi-straight');
  el.innerHTML = '';
  const tileH = 133;
  for (let i = 0; i < 3; i++) {
    const img = document.createElement('img');
    img.className = 'road-tile';
    img.src = assets['straight'];
    img.style.cssText = `left:0; top:${i * tileH}px; width:200px; height:${tileH + 1}px;`;
    el.appendChild(img);
  }
  const guide = document.createElement('div');
  guide.className = 'guide-line multi-guide';
  guide.style.top = `${tileH + tileH / 2}px`;
  el.appendChild(guide);
  const ch = document.createElement('img');
  ch.className = 'character multi-char';
  ch.src = assets[charKey];
  el.appendChild(ch);
}

function buildMultiCorner() {
  const el = document.getElementById('multi-corner');
  el.innerHTML = '';
  const tileH = 133;
  const halfW = 100;

  const tiles = [
    { src: 'straight',  x: 0,     y: 0 },
    { src: 'bg-tile',   x: halfW, y: 0 },
    { src: 'corner-tl', x: 0,     y: tileH },
    { src: 'corner-br', x: halfW, y: tileH },
    { src: 'bg-tile',   x: 0,     y: tileH * 2 },
    { src: 'straight',  x: halfW, y: tileH * 2 },
  ];
  tiles.forEach(t => {
    const img = document.createElement('img');
    img.className = 'road-tile';
    img.src = assets[t.src];
    img.style.cssText = `left:${t.x}px; top:${t.y}px; width:${halfW}px; height:${tileH + 1}px;`;
    el.appendChild(img);
  });

  const ch = document.createElement('img');
  ch.className = 'character multi-char';
  ch.src = assets[charKey];
  el.appendChild(ch);
}

function rebuildAll() {
  buildGrid();
  buildMultiStraight();
  buildMultiCorner();
  update();
}

function update() {
  const offsetY = parseInt(offsetYInput.value);
  const scale = parseInt(charScaleInput.value) / 100;
  const showGuides = showGuidesInput.checked;

  document.getElementById('offsetY-val').textContent = `${offsetY}px`;
  document.getElementById('charScale-val').textContent = `${Math.round(scale * 100)}%`;

  // Single tile cards
  document.querySelectorAll('#grid .tile-preview').forEach(preview => {
    const w = preview.clientWidth;
    const h = preview.clientHeight;
    const charSize = w * scale;
    const ch = preview.querySelector('.character');
    ch.src = assets[charKey];
    ch.style.width = charSize + 'px';
    ch.style.height = charSize + 'px';
    ch.style.left = (w - charSize) / 2 + 'px';
    ch.style.top = (h - charSize) / 2 + offsetY + 'px';
    preview.querySelector('.guide-line').style.display = showGuides ? 'block' : 'none';
  });

  // Multi straight
  const ms = document.getElementById('multi-straight');
  const msChar = ms.querySelector('.multi-char');
  if (msChar) {
    const tileH = 133;
    const charSize = 200 * scale;
    msChar.src = assets[charKey];
    msChar.style.width = charSize + 'px';
    msChar.style.height = charSize + 'px';
    msChar.style.left = (200 - charSize) / 2 + 'px';
    msChar.style.top = (tileH + tileH / 2 - charSize / 2 + offsetY) + 'px';
    const msGuide = ms.querySelector('.multi-guide');
    if (msGuide) msGuide.style.display = showGuides ? 'block' : 'none';
  }

  // Multi corner
  const mc = document.getElementById('multi-corner');
  const mcChar = mc.querySelector('.multi-char');
  if (mcChar) {
    const tileH = 133;
    const halfW = 100;
    const charSize = halfW * scale;
    mcChar.src = assets[charKey];
    mcChar.style.width = charSize + 'px';
    mcChar.style.height = charSize + 'px';
    mcChar.style.left = (halfW - charSize / 2) + 'px';
    mcChar.style.top = (tileH + tileH / 2 - charSize / 2 + offsetY) + 'px';
  }
}

offsetYInput.addEventListener('input', update);
charScaleInput.addEventListener('input', update);
showGuidesInput.addEventListener('change', update);

// Character direction buttons
document.querySelectorAll('#charDirection button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#charDirection button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    charKey = btn.dataset.key;
    rebuildAll();
  });
});

rebuildAll();
</script>
</body>
</html>
